# TEMPLATE — DO NOT apply this file directly.
# This manifest shows the shape of the three Discord webhook Secrets.
# Create them imperatively so the webhook URLs never land in the repo:
#
#   kubectl create secret generic discord-webhook-default  -n monitoring \
#     --from-literal=DISCORD_WEBHOOK='https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN'
#   kubectl create secret generic discord-webhook-critical -n monitoring \
#     --from-literal=DISCORD_WEBHOOK='https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN'
#   kubectl create secret generic discord-webhook-warning  -n monitoring \
#     --from-literal=DISCORD_WEBHOOK='https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN'
#
# Each secret maps to a different Discord channel.
# See the Discord webhook section in ./README.md for full context.
---
apiVersion: v1
kind: Secret
metadata:
  name: discord-webhook-default
  namespace: monitoring
type: Opaque
data:
  DISCORD_WEBHOOK: <base64-encoded-webhook-url>
---
apiVersion: v1
kind: Secret
metadata:
  name: discord-webhook-critical
  namespace: monitoring
type: Opaque
data:
  DISCORD_WEBHOOK: <base64-encoded-webhook-url>
---
apiVersion: v1
kind: Secret
metadata:
  name: discord-webhook-warning
  namespace: monitoring
type: Opaque
data:
  DISCORD_WEBHOOK: <base64-encoded-webhook-url>
