# TEMPLATE — DO NOT apply this file directly.
# This manifest shows the shape of the Secret (name, namespace, keys).
# Create it imperatively so the token never lands in the repo:
#
#   kubectl create secret generic cloudflare-token-secret -n cert-manager \
#     --from-literal=cloudflare-token='<your-cloudflare-api-token>'
#
# See the cert-manager / DNS-01 section in ../../README.md for full context.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token-secret
  namespace: cert-manager
type: Opaque
stringData:
  cloudflare-token: <cloudflare-api-token>
