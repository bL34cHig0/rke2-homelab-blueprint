# TEMPLATE — DO NOT apply this file directly.
# This manifest shows the shape of the Secret (name, namespace, keys).
# Create it imperatively so credentials never land in the repo:
#
#   htpasswd -nbB <username> <strong-password>     # copy the output
#   kubectl create secret generic traefik-dashboard-auth -n traefik \
#     --from-literal=users='<htpasswd-output>'
#
# See the Traefik dashboard section in ../README.md for full context.
apiVersion: v1
kind: Secret
metadata:
  name: traefik-dashboard-auth
  namespace: traefik
type: Opaque
data:
  users: <base64-encoded-credential> # both should be base64 encoded
