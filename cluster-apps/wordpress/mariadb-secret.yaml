# TEMPLATE — DO NOT apply this file directly.
# This manifest shows the shape of the Secret (name, namespace, keys).
# Create it imperatively so credentials never land in the repo:
#
#   kubectl create secret generic mariadb -n wordpress \
#     --from-literal=username='<db-username>' \
#     --from-literal=password='<strong-password>' \
#     --from-literal=rootpw='<strong-rootpw>'
#
# See Step 2 in ./README.md for full context.
apiVersion: v1
kind: Secret
metadata:
  name: mariadb
  namespace: wordpress
type: Opaque
data:
  username: <base64-encoded-username>
  password: <base64-encoded-strong-password>
  rootpw: <base64-encoded-strong-password>
