apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: default-cert-production
  namespace: wordpress
spec:
  secretName: default-cert-production-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.<your-domain>"
  dnsNames:
  - "<your-domain>"
  - "*.<your-domain>"
  privateKey:
    rotationPolicy: Always
