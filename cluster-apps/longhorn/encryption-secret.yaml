# Template showing the shape of the Longhorn encryption Secret.
# Do NOT commit a real CRYPTO_KEY_VALUE — create this Secret imperatively
# (see README "Create the Encryption Secret") so the passphrase never touches the repo.
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-crypto
  namespace: longhorn-system
type: Opaque
stringData:
  CRYPTO_KEY_VALUE: "<strong-passphrase>"   # the LUKS passphrase — keep in a password manager
  CRYPTO_KEY_PROVIDER: "secret"             # read the key from this Secret
  CRYPTO_KEY_CIPHER: "aes-xts-plain64"
  CRYPTO_KEY_HASH: "sha256"
  CRYPTO_KEY_SIZE: "256"
  CRYPTO_PBKDF: "argon2i"
