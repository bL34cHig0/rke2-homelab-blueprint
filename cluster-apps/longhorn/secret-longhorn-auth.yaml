# TEMPLATE — DO NOT apply this file directly.
# This manifest shows the shape of the Secret (name, namespace, keys).
# Create it imperatively so credentials never land in the repo:
#
#   htpasswd -nbB <username> <strong-password>     # copy the output
#   kubectl create secret generic longhorn-auth -n longhorn-system \
#     --from-literal=users='<htpasswd-output>'
#
# See the "Access the Longhorn UI" section in ./README.md for full context.
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-auth
  namespace: longhorn-system
type: Opaque
data:
  users: <base64-encoded-credential> # the htpasswd line, base64 encoded
